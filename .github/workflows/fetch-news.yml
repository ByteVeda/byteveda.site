name: Fetch news

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:

concurrency:
  group: fetch-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    name: Fetch and open PR
    runs-on: ubuntu-latest
    environment: news-refresh
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch news
        run: pnpm fetch:news
        env:
          GH_NEWS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open or update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.NEWS_PAT }}
          branch: news/auto-refresh
          base: main
          commit-message: "chore(news): refresh feed"
          title: "chore(news): refresh feed"
          body: |
            Automated refresh of `src/features/news/data/news.json` from the news fetcher.

            Generated by `.github/workflows/fetch-news.yml`.
          labels: automated, news
          delete-branch: true
          add-paths: src/features/news/data/news.json
